services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil", "--host", "0.0.0.0", "--port", "8545", "--block-time", "1", "--silent"]
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "bn", "--rpc-url", "http://localhost:8545"]
      interval: 3s
      timeout: 3s
      retries: 10

  deploy:
    image: ghcr.io/foundry-rs/foundry:latest
    volumes:
      - ./contracts:/app/contracts
      - ./scripts:/app/scripts
      - ./contracts/.solc-cache/solc-0.8.24:/home/foundry/.svm/0.8.24/solc-0.8.24:ro
    entrypoint: ["sh", "/app/scripts/deploy-local.sh"]
    environment:
      ANVIL_URL: http://anvil:8545
      DEPLOYER_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      OUTPUT_FILE: /app/contracts/deployments/local.json
    depends_on:
      anvil:
        condition: service_healthy

  db:
    image: timescale/timescaledb:2.17.2-pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: agentproof
      POSTGRES_USER: agentproof
      POSTGRES_PASSWORD: localdev
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/blockthrough/pipeline/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./src/blockthrough/pipeline/schema_mcp.sql:/docker-entrypoint-initdb.d/02-schema_mcp.sql
      - ./src/blockthrough/pipeline/schema_alerts.sql:/docker-entrypoint-initdb.d/03-schema_alerts.sql
      - ./src/blockthrough/pipeline/schema_benchmarks.sql:/docker-entrypoint-initdb.d/04-schema_benchmarks.sql
      - ./src/blockthrough/pipeline/schema_benchmark_config.sql:/docker-entrypoint-initdb.d/05-schema_benchmark_config.sql
      - ./src/blockthrough/pipeline/schema_routing.sql:/docker-entrypoint-initdb.d/06-schema_routing.sql
      - ./src/blockthrough/pipeline/schema_cache_tokens.sql:/docker-entrypoint-initdb.d/07-schema_cache_tokens.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentproof"]
      interval: 5s
      timeout: 5s
      retries: 5

  litellm:
    profiles: ["proxy"]
    image: ghcr.io/berriai/litellm:main-stable
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-config.example.yaml:/app/config.yaml
      - ./src/blockthrough:/app/blockthrough
      - ./pyproject.toml:/app/pyproject.toml
    entrypoint: ["sh", "-c", "pip install --no-cache-dir /app && litellm --config /app/config.yaml --port 4000"]
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AGENTPROOF_DATABASE_URL: postgresql+asyncpg://agentproof:localdev@db:5432/agentproof
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8100:8100"
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./contracts/deployments:/app/contracts/deployments:ro
    environment:
      AGENTPROOF_DATABASE_URL: postgresql+asyncpg://agentproof:localdev@db:5432/agentproof
      AGENTPROOF_UPSTREAM_URL: ${AGENTPROOF_UPSTREAM_URL:-http://litellm:4000}
      AGENTPROOF_ANTHROPIC_UPSTREAM_URL: ${AGENTPROOF_ANTHROPIC_UPSTREAM_URL:-https://litellm.justworksai.net}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      AGENTPROOF_ENV: development
      AGENTPROOF_ROUTING_ENABLED: "true"
      AGENTPROOF_ROUTING_AVAILABLE_MODELS: '["claude-opus-4-6","claude-opus-4-5","claude-opus-4-5-20251101","us.anthropic.claude-opus-4-5-20251101-v1:0","claude-sonnet-4-6","claude-sonnet-4-5-20250929","claude-haiku-4-5-20251001","gpt-5.2-chat-latest","gpt-5.2-codex","us.amazon.nova-2-lite-v1:0","google.gemma-3-27b-it","google.gemma-3-12b-it","google.gemma-3-4b-it","qwen.qwen3-vl-235b-a22b","qwen.qwen3-next-80b-a3b","qwen.qwen3-coder-30b-a3b-v1:0","openai.gpt-oss-120b-1:0","openai.gpt-oss-20b-1:0","mistral.ministral-3-14b-instruct","mistral.ministral-3-8b-instruct","mistral.ministral-3-3b-instruct","moonshot.kimi-k2-thinking","moonshotai.kimi-k2.5","minimax.minimax-m2.1"]'
      AGENTPROOF_BENCHMARK_ENABLED: "true"
      AGENTPROOF_ATTESTATION_PROVIDER: evm
      AGENTPROOF_ATTESTATION_RPC_URL: http://anvil:8545
      AGENTPROOF_ATTESTATION_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      AGENTPROOF_ATTESTATION_DEPLOYMENTS_PATH: /app/contracts/deployments/local.json
      AGENTPROOF_ATTESTATION_SCHEDULER_INTERVAL_S: "30"
    depends_on:
      db:
        condition: service_healthy
      deploy:
        condition: service_completed_successfully
    command: ["uvicorn", "blockthrough.api.app:app", "--host", "0.0.0.0", "--port", "8100", "--reload"]

  dashboard:
    image: node:20-slim
    working_dir: /app
    ports:
      - "8081:5173"
    environment:
      CI: "true"
      API_URL: "http://api:8100"
    volumes:
      - ./dashboard:/app
    command: ["sh", "-c", "corepack enable && pnpm install --frozen-lockfile && pnpm dev --host 0.0.0.0"]
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
